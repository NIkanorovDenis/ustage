name: Deploy to production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    permissions:
      contents: read

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Configure SSH
        env:
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          PROD_KNOWN_HOSTS: ${{ secrets.PROD_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$PROD_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$PROD_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy tracked site files
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_PATH: ${{ secrets.PROD_PATH }}
        run: |
          test -n "$PROD_HOST"
          test -n "$PROD_USER"
          test -n "$PROD_PATH"
          PROD_PORT="${PROD_PORT:-22}"
          rsync -az --checksum \
            --no-perms \
            --omit-dir-times \
            --delay-updates \
            --exclude='/upload/' \
            --exclude='/bitrix/.settings.php' \
            --exclude='/bitrix/.settings_extra.php' \
            --exclude='/bitrix/php_interface/dbconn.php' \
            --exclude='/bitrix/cache/' \
            --exclude='/bitrix/managed_cache/' \
            --exclude='/bitrix/stack_cache/' \
            --exclude='/bitrix/backup/' \
            --exclude='/bitrix/tmp/' \
            -e "ssh -p $PROD_PORT" \
            www/ "$PROD_USER@$PROD_HOST:$PROD_PATH/"

      - name: Run database migrations
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_PORT: ${{ secrets.PROD_PORT }}
          PROD_USER: ${{ secrets.PROD_USER }}
        run: |
          PROD_PORT="${PROD_PORT:-22}"
          ssh -p "$PROD_PORT" "$PROD_USER@$PROD_HOST" migrate
