services:
  nginx:
    image: nginx:1.28-alpine
    ports:
      - "8080:80"
    volumes:
      - ./www:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      php:
        condition: service_healthy
    restart: unless-stopped

  php:
    build:
      context: ./docker/php
    volumes:
      - ./www:/var/www/html
      - ./docker/php/bitrix.ini:/usr/local/etc/php/conf.d/bitrix.ini:ro
    environment:
      TZ: Europe/Moscow
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  db:
    image: mysql:8.0
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --sql-mode=
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-bitrix}
      MYSQL_USER: ${MYSQL_USER:-bitrix}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-bitrix_change_me}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_change_me}
      TZ: Europe/Moscow
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/bitrix.cnf:/etc/mysql/conf.d/bitrix.cnf:ro
      - ./import:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 15
    restart: unless-stopped

volumes:
  mysql_data:
